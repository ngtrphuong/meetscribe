name: AI Code Review (Claude Code)
on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

jobs:
  claude-review:
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            You are reviewing a PR for MeetScribe, an AI meeting notes platform.
            Read CLAUDE.md in the repo root for all architectural rules.

            Review this PR and check for:
            1. ASR engines implementing the ASREngine ABC correctly (§4.1)
            2. GPU memory within budget (§4.4): LIVE ≤5GB, POST ≤12GB on RTX 3090
            3. Angular: Signals for sync state, RxJS for async streams, standalone components only (§8)
            4. Flutter: Riverpod state, fonnx/sherpa-onnx for on-device (§9)
            5. Decree 356: consent checked before mic access, SQLCipher for storage, ephemeral audio (§12)
            6. No raw SQL in API routes — all via repository layer
            7. WebSocket messages follow the format in §7.2
            8. No blocking GPU calls in async FastAPI endpoints — subprocess isolation required
            9. Vietnamese text: UTF-8 preserved, diacritics intact

            Post findings as PR comments. Be specific with file:line references.
