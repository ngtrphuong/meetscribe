name: Backend CI

on:
  push:
    paths: ['backend/**', 'tests/backend/**', 'pyproject.toml']
  pull_request:
    paths: ['backend/**', 'tests/backend/**']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -e ".[dev]"
      - run: ruff check backend/ --select E,F,W,I
      - run: pytest tests/backend/ -v --cov=backend
        env:
          MEETSCRIBE_DB_KEY: ci-test-key
          MEETSCRIBE_ENV: test
