name: meetscribe
description: "Vietnamese-first AI Meeting Intelligence — Flutter mobile client"
version: 0.2.0+1
publish_to: 'none'

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  # State management (CLAUDE.md §9)
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Audio recording (background PCM streaming)
  record: ^5.2.0

  # WebSocket
  web_socket_channel: ^3.0.1

  # HTTP
  dio: ^5.7.0

  # Permissions
  permission_handler: ^11.3.1

  # Local storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # On-device ASR (ONNX)
  fonnx: ^0.1.0

  # JSON serialization
  json_annotation: ^4.9.0

  # Utilities
  path_provider: ^2.1.5
  uuid: ^4.5.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/images/
